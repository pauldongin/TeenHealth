name: TeenHealth
options:
  bundleIdPrefix: com.pauldon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.pauldon.TeenHealth
    DEVELOPMENT_TEAM: ""
    INFOPLIST_FILE: TeenHealth/Info.plist
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  TeenHealth:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TeenHealth
        excludes:
          - "**/*.plist"
    resources:
      - TeenHealth/Assets.xcassets
      - TeenHealth/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pauldon.TeenHealth
        INFOPLIST_FILE: TeenHealth/Info.plist
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: TeenHealth/TeenHealth.entitlements
    dependencies:
      - sdk: HealthKit.framework
      - sdk: UserNotifications.framework
